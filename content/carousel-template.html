<div class="obsidian-carousel">
  <!-- Radio buttons for slide control -->
  <input type="radio" name="carousel-radio" class="carousel-radio" id="slide1" checked>
  <input type="radio" name="carousel-radio" class="carousel-radio" id="slide2">
  <input type="radio" name="carousel-radio" class="carousel-radio" id="slide3">

  <!-- Slides -->
  <div class="carousel-slides">
    <div class="carousel-slide">
      <img src="https://via.placeholder.com/800x400/FF6B6B/FFFFFF?text=Slide+1" alt="Slide 1">
    </div>
    <div class="carousel-slide">
      <img src="https://via.placeholder.com/800x400/4ECDC4/FFFFFF?text=Slide+2" alt="Slide 2">
    </div>
    <div class="carousel-slide">
      <img src="https://via.placeholder.com/800x400/45B7D1/FFFFFF?text=Slide+3" alt="Slide 3">
    </div>
  </div>

  <!-- Navigation buttons - multiple labels for each state -->
  <label for="slide3" class="carousel-prev">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </label>
  <label for="slide1" class="carousel-prev">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </label>
  <label for="slide2" class="carousel-prev">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </label>

  <label for="slide2" class="carousel-next">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </label>
  <label for="slide3" class="carousel-next">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </label>
  <label for="slide1" class="carousel-next">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </label>

  <!-- Dots -->
  <div class="carousel-dots">
    <label for="slide1" class="carousel-dot"></label>
    <label for="slide2" class="carousel-dot"></label>
    <label for="slide3" class="carousel-dot"></label>
  </div>
</div>
